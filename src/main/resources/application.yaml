spring:
  application:
    name: expense-tracker

  redis:
    host: localhost
    port: 6379

server:
  port: 3000
  error:
    include-message: always
    include-binding-errors: always

aws:
  region: eu-west-1
  dynamodb:
    table-name: expenses

logging:
  level:
    com.jamel.expense_tracker: DEBUG
    software.amazon.awssdk: WARN

rate-limit:
  requests: 2
  seconds: 60